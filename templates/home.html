<!DOCTYPE html>
<html lang="en">
<head>
    <title>🔥 Forest Fire Prediction</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
</head>

<body>

    <div class="login">
        <h1>🔥 Forest Fire Prediction</h1>

        <!-- Form -->
        <form action="{{ url_for('predict_datapoint') }}" method="post">

            <input type="number" step="0.1" name="Temperature" placeholder="🌡 Temperature" required>
            <input type="number" step="0.1" name="RH" placeholder="💧 Relative Humidity" required>
            <input type="number" step="0.1" name="Ws" placeholder="🌬 Wind Speed" required>
            <input type="number" step="0.1" name="Rain" placeholder="🌧 Rainfall" required>
            <input type="number" step="0.1" name="FFMC" placeholder="🔥 FFMC" required>
            <input type="number" step="0.1" name="DMC" placeholder="🌿 DMC" required>
            <input type="number" step="0.1" name="ISI" placeholder="⚡ ISI" required>

            <input type="number" name="Classes" placeholder="📊 Classes (0/1)" required>
            <input type="number" name="Region" placeholder="🌍 Region (0/1)" required>

            <button type="submit">🚀 Predict Fire Risk</button>

        </form>

        <!-- Result -->
        {% if results %}
            <h2 class="{% if results == 'High Fire Risk' %}high{% else %}low{% endif %}">
                🔥 Prediction: {{ results }}
            </h2>
        {% endif %}

    </div>

</body>
</html>
